name: 🧪 E2E Test

on:
  pull_request:
  push:
    branches:
       - master

jobs:
  e2e-test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        version: [26, 24, 22]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - id: setup-node-and-pnpm
        uses: ./.github/actions/setup-node-and-pnpm-dependencies
        with:
          node-version: ${{ matrix.version }}
          runner-os: ${{ matrix.os }}
          cache: 'pnpm'
      - name: Build
        run: pnpm build
      - name: Pack
        run: pnpm pack
      - name: Setup pnpm global bin
        run: |
          mkdir -p "$RUNNER_TEMP/pnpm-global/bin"
          echo "PNPM_HOME=$RUNNER_TEMP/pnpm-global" >> "$GITHUB_ENV"
          echo "$RUNNER_TEMP/pnpm-global" >> "$GITHUB_PATH"
          echo "$RUNNER_TEMP/pnpm-global/bin" >> "$GITHUB_PATH"
        shell: bash
      - name: Install
        run: pnpm install -g $(pwd)/git-jira-branch-*.tgz
        shell: bash
      - name: Run E2E tests
        env:
          JIRA_API_TOKEN: ${{ secrets.GCJB_JIRA_API_TOKEN }}
          JIRA_USER_EMAIL: ${{ secrets.GCJB_USER_EMAIL }}
          JIRA_API_URL: ${{ vars.GCJB_JIRA_API_URL }}
          JIRA_KEY_PREFIX: ${{ vars.GCJB_JIRA_KEY_PREFIX }}
          GIT_JB_BIN: 'git-jira-branch'
        run: pnpm e2e-test:ci
