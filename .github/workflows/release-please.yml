on:
  push:
    branches:
      - master

# Keep this filename: npm trusted publishing authorizes the exact workflow path.
name: 🤖 Release

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write
  id-token: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
      - name: Setup Node, pnpm, and dependencies
        uses: ./.github/actions/setup-node-and-pnpm-dependencies
      # Changesets 2.31 expects the npm 11 metadata shape from `npm info`.
      # pnpm performs the actual publication using npm trusted publishing.
      - name: Install npm for Changesets registry checks
        run: npm install -g npm@11.16.0
      - name: Create release pull request or publish to npm
        id: changesets
        uses: changesets/action@a45c4d594aa4e2c509dc14a9f2b3b67ba3780d0d # v1.9.0
        with:
          publish: pnpm release
          version: pnpm version-packages
          commit: Release package updates
          title: Release package updates
          createGithubReleases: true
        env:
          # The existing PAT lets CI run on pull requests created by this action.
          GITHUB_TOKEN: ${{ secrets.RELEASE_PLEASE_PAT }}
