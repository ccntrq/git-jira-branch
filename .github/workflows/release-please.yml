on:
  push:
    branches:
      - master

# Keep this filename: npm trusted publishing authorizes the exact workflow path.
name: 🤖 Release

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write
  id-token: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Setup Node, pnpm, and dependencies
        uses: ./.github/actions/setup-node-and-pnpm-dependencies
      - name: Install an npm version that supports trusted publishing
        run: npm install -g npm@latest
      - name: Create release pull request or publish to npm
        id: changesets
        uses: changesets/action@63a615b9cd06ba9a3e6d13796c7fbcb080a60a0b # v1.8.0
        with:
          publish: pnpm release
          version: pnpm version-packages
          commit: Release package updates
          title: Release package updates
          createGithubReleases: true
        env:
          # The existing PAT lets CI run on pull requests created by this action.
          GITHUB_TOKEN: ${{ secrets.RELEASE_PLEASE_PAT }}
